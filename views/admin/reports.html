<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Admin | SPSMIS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
  <style>
    .report-type-card { cursor: pointer; border: 2px solid var(--gray-200); border-radius: 12px; padding: 1rem; text-align: center; transition: all .2s; }
    .report-type-card:hover, .report-type-card.selected { border-color: var(--primary); background: var(--primary-light); }
    .report-type-card i { font-size: 1.5rem; color: var(--primary); margin-bottom: .5rem; }
    .report-type-card div { font-size: .82rem; font-weight: 600; }
    @media print {
      .no-print { display: none !important; }
      .print-area { display: block !important; }
      body { background: white; }
      .main-content { margin: 0 !important; padding: 1rem !important; }
      .card { box-shadow: none !important; border: 1px solid #ddd !important; }
    }
  </style>
</head>
<body>
<div id="desktop-only-overlay"><i class="fas fa-desktop"></i><h4>Desktop Required</h4><p>Please use a computer or laptop to access this portal.</p></div>
<div id="sidebar-placeholder"></div>
<div class="app-wrapper">
  <div class="main-content page-content">
    <nav class="top-navbar no-print">
      <div><div class="page-title">Reports</div><nav aria-label="breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item text-muted">Admin</li><li class="breadcrumb-item active">Reports</li></ol></nav></div>
      <div class="ms-auto"><div class="user-menu"><div class="user-avatar" id="user-avatar-text">A</div><div><div class="user-name" id="user-display-name">Admin</div><div class="user-role" id="user-display-role">Administrator</div></div></div></div>
    </nav>

    <div class="page-header no-print"><h3>Reports</h3><p>Generate and print student reports</p></div>

    <!-- Report Types -->
    <div class="row g-2 mb-3 no-print">
      <div class="col-auto"><div class="report-type-card selected" id="rt-enrollment" onclick="selectReportType('enrollment')"><i class="fas fa-list"></i><div>Enrollment List</div></div></div>
      <div class="col-auto"><div class="report-type-card" id="rt-masterlist" onclick="selectReportType('masterlist')"><i class="fas fa-address-book"></i><div>Student Masterlist</div></div></div>
      <div class="col-auto"><div class="report-type-card" id="rt-gender" onclick="selectReportType('gender')"><i class="fas fa-venus-mars"></i><div>Gender Summary</div></div></div>
    </div>

    <!-- Filters -->
    <div class="card mb-3 no-print">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-md-3"><label class="form-label mb-1">School Year</label>
            <select id="r-sy" class="form-select"><option value="2025-2026">2025–2026</option><option value="2024-2025">2024–2025</option></select>
          </div>
          <div class="col-md-3"><label class="form-label mb-1">Grade Level</label>
            <select id="r-grade" class="form-select" onchange="updateRSection()"><option value="">All Grade Levels</option></select>
          </div>
          <div class="col-md-2"><label class="form-label mb-1">Section</label>
            <select id="r-section" class="form-select"><option value="">All Sections</option></select>
          </div>
          <div class="col-md-3"><label class="form-label mb-1">Search Name / LRN</label>
            <input type="text" id="r-search" class="form-control" placeholder="Search...">
          </div>
          <div class="col-md-1"><button class="btn btn-primary w-100" onclick="generateReport()"><i class="fas fa-search"></i></button></div>
        </div>
      </div>
    </div>

    <!-- Report Output -->
    <div class="card" id="report-output" style="display:none;">
      <div class="card-header d-flex align-items-center justify-content-between">
        <span id="report-title-display"><i class="fas fa-file-alt me-2" style="color:var(--primary);"></i>Report</span>
        <button class="btn btn-sm btn-primary no-print" onclick="window.print()"><i class="fas fa-print me-2"></i>Print Report</button>
      </div>
      <!-- Print Header -->
      <div class="card-body" style="border-bottom:1px solid var(--gray-200);">
        <div class="text-center mb-2">
          <strong style="font-size:1rem;">Minanga Integrated School</strong><br>
          <span style="font-size:.82rem;color:var(--gray-600);">Minanga, Cagayan de Oro City</span><br>
          <span id="print-report-name" style="font-size:.9rem;font-weight:600;"></span><br>
          <span id="print-sy" style="font-size:.78rem;color:var(--gray-600);"></span>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-modern mb-0" id="report-table">
            <thead id="report-thead"></thead>
            <tbody id="report-tbody"></tbody>
          </table>
        </div>
        <div class="p-3" id="report-summary" style="font-size:.82rem;border-top:1px solid var(--gray-200);"></div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../data/mock-users.js"></script>
<script src="../../data/mock-students.js"></script>
<script src="../../assets/js/storage.js"></script>
<script src="../../assets/js/components.js"></script>
<script src="../../assets/js/auth.js"></script>
<script>
  initAdminPage('reports');
  loadComponent('#sidebar-placeholder', '/components/admin-sidebar.html');
  populateGradeDropdown(document.getElementById('r-grade'), true);

  let currentType = 'enrollment';
  function selectReportType(type) {
    currentType = type;
    document.querySelectorAll('.report-type-card').forEach(c => c.classList.remove('selected'));
    document.getElementById(`rt-${type}`).classList.add('selected');
  }
  function updateRSection() {
    populateSectionDropdown(document.getElementById('r-section'), document.getElementById('r-grade').value, true);
  }

  function generateReport() {
    const sy = document.getElementById('r-sy').value;
    const grade = document.getElementById('r-grade').value;
    const section = document.getElementById('r-section').value;
    const q = document.getElementById('r-search').value.toLowerCase();
    let list = getStudents().filter(s => {
      if (grade && s.gradeLevel !== grade) return false;
      if (section && s.section !== section) return false;
      const name = `${s.firstName} ${s.lastName}`.toLowerCase();
      if (q && !name.includes(q) && !s.lrn.includes(q)) return false;
      return true;
    });
    const output = document.getElementById('report-output');
    output.style.display = 'block';
    const titles = { enrollment: 'Enrollment List', masterlist: 'Student Masterlist', gender: 'Gender Summary' };
    document.getElementById('print-report-name').textContent = titles[currentType];
    document.getElementById('print-sy').textContent = `School Year ${sy}` + (grade ? ` | ${grade}` : '') + (section ? ` — ${section}` : '');
    document.getElementById('report-title-display').innerHTML = `<i class="fas fa-file-alt me-2" style="color:var(--primary);"></i>${titles[currentType]}`;
    const thead = document.getElementById('report-thead');
    const tbody = document.getElementById('report-tbody');
    const summary = document.getElementById('report-summary');

    if (currentType === 'enrollment') {
      thead.innerHTML = '<tr><th>#</th><th>LRN</th><th>Full Name</th><th>Grade Level</th><th>Section</th><th>Sex</th><th>Age</th><th>Status</th></tr>';
      tbody.innerHTML = list.map((s,i) => `<tr><td>${i+1}</td><td style="font-family:monospace;">${s.lrn}</td><td>${s.lastName}, ${s.firstName} ${s.middleName}</td><td>${s.gradeLevel}</td><td>${s.section}</td><td>${s.sex}</td><td>${s.age}</td><td><span class="badge-active">Active</span></td></tr>`).join('') || '<tr><td colspan="8" class="text-center text-muted py-3">No records found.</td></tr>';
      summary.innerHTML = `<strong>Total Records:</strong> ${list.length} &nbsp;|&nbsp; <strong>Male:</strong> ${list.filter(s=>s.sex==='Male').length} &nbsp;|&nbsp; <strong>Female:</strong> ${list.filter(s=>s.sex==='Female').length}`;
    } else if (currentType === 'masterlist') {
      thead.innerHTML = '<tr><th>#</th><th>LRN</th><th>Full Name</th><th>Grade</th><th>Section</th><th>Sex</th><th>Birthdate</th><th>Age</th><th>Contact</th></tr>';
      tbody.innerHTML = list.map((s,i) => `<tr><td>${i+1}</td><td style="font-family:monospace;font-size:.78rem;">${s.lrn}</td><td>${s.lastName}, ${s.firstName}</td><td>${s.gradeLevel}</td><td>${s.section}</td><td>${s.sex}</td><td>${formatDate(s.birthdate)}</td><td>${s.age}</td><td>${s.contact}</td></tr>`).join('') || '<tr><td colspan="9" class="text-center text-muted py-3">No records found.</td></tr>';
      summary.innerHTML = `<strong>Total Students:</strong> ${list.length}`;
    } else {
      const male = list.filter(s=>s.sex==='Male').length;
      const female = list.filter(s=>s.sex==='Female').length;
      thead.innerHTML = '<tr><th>Category</th><th>Count</th><th>Percentage</th></tr>';
      tbody.innerHTML = `<tr><td><i class="fas fa-mars me-2" style="color:var(--primary);"></i>Male</td><td>${male}</td><td>${list.length ? Math.round(male/list.length*100) : 0}%</td></tr><tr><td><i class="fas fa-venus me-2" style="color:var(--danger);"></i>Female</td><td>${female}</td><td>${list.length ? Math.round(female/list.length*100) : 0}%</td></tr>`;
      summary.innerHTML = `<strong>Total Students:</strong> ${list.length}`;
    }
    output.scrollIntoView({ behavior:'smooth' });
  }
</script>
</body>
</html>

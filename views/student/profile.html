<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Profile — Student | SPSMIS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="../../assets/css/student-mobile.css">
</head>
<body>
<div class="student-app">
  <div class="student-header">
    <div class="header-row">
      <div><h6>Minanga Integrated School</h6><h5><i class="fas fa-arrow-left me-2" onclick="history.back()" style="cursor:pointer;"></i>My Profile</h5></div>
      <div style="width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;" id="header-avatar">S</div>
    </div>
  </div>

  <!-- Avatar Card -->
  <div class="profile-summary-card" style="flex-direction:column;text-align:center;">
    <div class="profile-avatar" id="profile-avatar" style="width:72px;height:72px;font-size:1.8rem;margin:0 auto .75rem;">S</div>
    <div class="fw-bold" style="font-size:1.05rem;" id="profile-fullname">—</div>
    <div style="font-size:.8rem;color:var(--gray-600);margin-top:2px;" id="profile-grade-section">—</div>
    <div style="font-family:monospace;font-size:.78rem;color:var(--gray-400);margin-top:2px;" id="profile-lrn">LRN: —</div>
  </div>

  <!-- Info Cards -->
  <div class="mobile-section">
    <div class="mobile-section-title">Personal Information</div>
    <div class="mobile-card">
      <div class="card-row mb-2"><span class="card-label">Full Name</span></div>
      <div class="card-value" id="info-name">—</div>
    </div>
    <div class="mobile-card">
      <div class="card-row"><span class="card-label">Sex</span><span class="card-value" id="info-sex">—</span></div>
    </div>
    <div class="mobile-card">
      <div class="card-row"><span class="card-label">Birthdate</span><span class="card-value" id="info-birthdate">—</span></div>
    </div>
    <div class="mobile-card">
      <div class="card-row"><span class="card-label">Age</span><span class="card-value" id="info-age">—</span></div>
    </div>
    <div class="mobile-card">
      <div class="card-row"><span class="card-label">Mother Tongue</span><span class="card-value" id="info-tongue">—</span></div>
    </div>
    <div class="mobile-card">
      <div class="card-row"><span class="card-label">Religion</span><span class="card-value" id="info-religion">—</span></div>
    </div>
    <div class="mobile-card">
      <div class="card-row mb-1"><span class="card-label">Address</span></div>
      <div class="card-value" style="font-size:.85rem;" id="info-address">—</div>
    </div>
  </div>

  <div class="mobile-section">
    <div class="mobile-section-title">Family Information</div>
    <div class="mobile-card"><div class="card-row"><span class="card-label">Mother</span><span class="card-value" id="info-mother">—</span></div></div>
    <div class="mobile-card"><div class="card-row"><span class="card-label">Father</span><span class="card-value" id="info-father">—</span></div></div>
    <div class="mobile-card"><div class="card-row"><span class="card-label">Guardian</span><span class="card-value" id="info-guardian">—</span></div></div>
  </div>

  <div class="mobile-section">
    <div class="mobile-section-title">Contact Information</div>
    <div class="mobile-card"><div class="card-row"><span class="card-label">Contact No.</span><span class="card-value" id="info-contact">—</span></div></div>
    <div class="mobile-card"><div class="card-row"><span class="card-label">Email</span><span class="card-value" style="font-size:.82rem;" id="info-email">—</span></div></div>
  </div>

  <div style="height:.5rem;"></div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="dashboard.html#grades-section" class="bottom-nav-item"><i class="fas fa-chart-bar"></i><span>Grades</span></a>
    <a href="profile.html" class="bottom-nav-item active"><i class="fas fa-user"></i><span>Profile</span></a>
    <a href="settings.html" class="bottom-nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../data/mock-users.js"></script>
<script src="../../data/mock-students.js"></script>
<script src="../../assets/js/storage.js"></script>
<script src="../../assets/js/components.js"></script>
<script>
  const session = requireAuth('student');
  const student = getStudentByLRN(session.lrn) || getStudents().find(s => s.firstName.toLowerCase() === session.name.split(' ')[0].toLowerCase());

  if (student) {
    const initial = student.firstName.charAt(0);
    document.getElementById('header-avatar').textContent = initial;
    document.getElementById('profile-avatar').textContent = initial;
    document.getElementById('profile-fullname').textContent = `${student.lastName}, ${student.firstName} ${student.middleName}`;
    document.getElementById('profile-grade-section').textContent = `${student.gradeLevel} | Section ${student.section}`;
    document.getElementById('profile-lrn').textContent = `LRN: ${student.lrn}`;
    document.getElementById('info-name').textContent = `${student.firstName} ${student.middleName} ${student.lastName}`;
    document.getElementById('info-sex').textContent = student.sex;
    document.getElementById('info-birthdate').textContent = formatDate(student.birthdate);
    document.getElementById('info-age').textContent = `${student.age} years old`;
    document.getElementById('info-tongue').textContent = student.motherTongue;
    document.getElementById('info-religion').textContent = student.religion;
    document.getElementById('info-address').textContent = student.address;
    document.getElementById('info-mother').textContent = student.motherName || '—';
    document.getElementById('info-father').textContent = student.fatherName || '—';
    document.getElementById('info-guardian').textContent = `${student.guardianName} (${student.guardianRelation})`;
    document.getElementById('info-contact').textContent = student.contact;
    document.getElementById('info-email').textContent = student.email;
  }
</script>
</body>
</html>

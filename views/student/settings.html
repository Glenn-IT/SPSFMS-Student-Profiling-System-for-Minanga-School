<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Settings — Student | SPSMIS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="../../assets/css/student-mobile.css">
</head>
<body>
<div class="student-app">
  <div class="student-header">
    <div class="header-row">
      <div><h6>Minanga Integrated School</h6><h5><i class="fas fa-arrow-left me-2" onclick="history.back()" style="cursor:pointer;"></i>Settings</h5></div>
      <div style="width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;" id="header-avatar">S</div>
    </div>
  </div>

  <!-- User Info Banner -->
  <div style="background:#fff;margin:.75rem;border-radius:12px;padding:1rem;box-shadow:0 1px 6px rgba(0,0,0,.08);display:flex;align-items:center;gap:.75rem;">
    <div style="width:48px;height:48px;background:var(--primary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:var(--primary);" id="profile-avatar">S</div>
    <div>
      <div class="fw-bold" id="settings-name">—</div>
      <div style="font-size:.78rem;color:var(--gray-600);" id="settings-grade">—</div>
    </div>
  </div>

  <!-- Change Password -->
  <div class="settings-group">
    <div class="mobile-section-title">Security</div>
    <div style="background:#fff;border-radius:12px;padding:1rem;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:.6rem;">
      <div style="font-size:.85rem;font-weight:600;margin-bottom:.75rem;"><i class="fas fa-lock me-2" style="color:var(--primary);"></i>Change Password</div>
      <div class="mb-2"><label class="form-label" style="font-size:.8rem;">Current Password</label><input type="password" id="s-old" class="form-control form-control-sm"></div>
      <div class="mb-2"><label class="form-label" style="font-size:.8rem;">New Password</label><input type="password" id="s-new" class="form-control form-control-sm"></div>
      <div class="mb-3"><label class="form-label" style="font-size:.8rem;">Confirm New Password</label><input type="password" id="s-confirm" class="form-control form-control-sm"></div>
      <button class="btn btn-primary btn-sm w-100" onclick="changePassword()"><i class="fas fa-key me-2"></i>Change Password</button>
    </div>

    <div style="background:#fff;border-radius:12px;padding:1rem;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:.6rem;">
      <div style="font-size:.85rem;font-weight:600;margin-bottom:.75rem;"><i class="fas fa-shield-alt me-2" style="color:var(--primary);"></i>Security Question</div>
      <div class="mb-2">
        <label class="form-label" style="font-size:.8rem;">Question</label>
        <select id="s-question" class="form-select form-select-sm">
          <option>What is the name of your first pet?</option>
          <option>What is your mother's maiden name?</option>
          <option>What city were you born in?</option>
          <option>What is the name of your elementary school?</option>
        </select>
      </div>
      <div class="mb-3"><label class="form-label" style="font-size:.8rem;">Your Answer</label><input type="text" id="s-answer" class="form-control form-control-sm" placeholder="Enter your answer"></div>
      <button class="btn btn-primary btn-sm w-100" onclick="showToast('Security question saved!','success')"><i class="fas fa-save me-2"></i>Save</button>
    </div>
  </div>

  <!-- App Info -->
  <div class="settings-group">
    <div class="mobile-section-title">About</div>
    <div class="mobile-card">
      <div class="card-row"><span class="card-label">System</span><span class="card-value" style="font-size:.82rem;">SPSMIS v1.0</span></div>
    </div>
    <div class="mobile-card">
      <div class="card-row"><span class="card-label">School Year</span><span class="card-value">2025–2026</span></div>
    </div>
    <div class="mobile-card">
      <div class="card-row"><span class="card-label">School</span><span class="card-value" style="font-size:.8rem;">Minanga Integrated School</span></div>
    </div>
  </div>

  <!-- Logout -->
  <div class="settings-group">
    <a class="settings-item danger" onclick="doLogout()">
      <div class="si-icon"><i class="fas fa-sign-out-alt"></i></div>
      <div class="si-label">Logout</div>
      <i class="fas fa-chevron-right si-arrow"></i>
    </a>
  </div>

  <div style="height:.5rem;"></div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="dashboard.html" class="bottom-nav-item"><i class="fas fa-chart-bar"></i><span>Grades</span></a>
    <a href="profile.html" class="bottom-nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    <a href="settings.html" class="bottom-nav-item active"><i class="fas fa-cog"></i><span>Settings</span></a>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../data/mock-users.js"></script>
<script src="../../data/mock-students.js"></script>
<script src="../../assets/js/storage.js"></script>
<script src="../../assets/js/components.js"></script>
<script>
  const session = requireAuth('student');
  const student = getStudentByLRN(session.lrn) || getStudents().find(s => s.firstName.toLowerCase() === session.name.split(' ')[0].toLowerCase());

  if (session) {
    const initial = session.name.charAt(0);
    document.getElementById('header-avatar').textContent = initial;
    document.getElementById('profile-avatar').textContent = initial;
    document.getElementById('settings-name').textContent = session.name;
    document.getElementById('settings-grade').textContent = student ? `${student.gradeLevel} | Section ${student.section}` : 'Student';
  }

  function changePassword() {
    const oldPw = document.getElementById('s-old').value;
    const newPw = document.getElementById('s-new').value;
    const confirmPw = document.getElementById('s-confirm').value;
    const user = MOCK_USERS.find(u => u.id === session.id);
    if (!user || oldPw !== user.password) { showToast('Current password is incorrect.', 'error'); return; }
    if (newPw.length < 6) { showToast('Password must be at least 6 characters.', 'error'); return; }
    if (newPw !== confirmPw) { showToast('Passwords do not match.', 'error'); return; }
    user.password = newPw;
    showToast('Password changed successfully!', 'success');
    ['s-old','s-new','s-confirm'].forEach(id => document.getElementById(id).value = '');
  }

  function doLogout() {
    confirmModal('Logout', 'Are you sure you want to logout?', () => logout());
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Teacher | SPSMIS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
  <style>.sidebar{background:#1e3a2f;}.sidebar-link.active{background:var(--secondary);}</style>
</head>
<body>
<div id="desktop-only-overlay"><i class="fas fa-desktop"></i><h4>Desktop Required</h4><p>Please use a computer or laptop.</p></div>
<div id="sidebar-placeholder"></div>
<div class="app-wrapper">
  <div class="main-content page-content">
    <nav class="top-navbar">
      <div><div class="page-title">Settings</div><nav aria-label="breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item text-muted">Teacher</li><li class="breadcrumb-item active">Settings</li></ol></nav></div>
      <div class="ms-auto"><div class="user-menu"><div class="user-avatar" id="user-avatar-text" style="background:var(--secondary);">T</div><div><div class="user-name" id="user-display-name">Teacher</div><div class="user-role" id="user-display-role">Teacher</div></div></div></div>
    </nav>
    <div class="page-header"><h3>Settings</h3><p>Manage your profile and account preferences</p></div>
    <div class="row g-3">
      <div class="col-lg-6">
        <div class="card">
          <div class="card-header" style="color:var(--secondary);"><i class="fas fa-user me-2"></i>Profile Settings</div>
          <div class="card-body">
            <div class="text-center mb-3">
              <div style="width:72px;height:72px;background:var(--secondary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;color:var(--secondary);margin:0 auto .75rem;" id="avatar-display">T</div>
              <div class="fw-bold" id="profile-name-display">—</div>
              <div class="text-muted" style="font-size:.78rem;" id="profile-role-display">—</div>
            </div>
            <div class="mb-3"><label class="form-label">Display Name</label><input type="text" id="s-name" class="form-control"></div>
            <div class="mb-3"><label class="form-label">Email</label><input type="email" id="s-email" class="form-control"></div>
            <button class="btn btn-success" onclick="saveProfile()"><i class="fas fa-save me-2"></i>Save Profile</button>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card">
          <div class="card-header" style="color:var(--secondary);"><i class="fas fa-lock me-2"></i>Change Password</div>
          <div class="card-body">
            <div class="mb-3"><label class="form-label">Current Password</label><input type="password" id="s-old-pw" class="form-control"></div>
            <div class="mb-3"><label class="form-label">New Password</label><input type="password" id="s-new-pw" class="form-control"></div>
            <div class="mb-3"><label class="form-label">Confirm New Password</label><input type="password" id="s-confirm-pw" class="form-control"></div>
            <button class="btn btn-success" onclick="changePassword()"><i class="fas fa-key me-2"></i>Change Password</button>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card">
          <div class="card-header" style="color:var(--secondary);"><i class="fas fa-shield-alt me-2"></i>Security Question</div>
          <div class="card-body">
            <div class="mb-3"><label class="form-label">Question</label>
              <select id="s-question" class="form-select"><option>What is the name of your first pet?</option><option>What is your mother's maiden name?</option><option>What city were you born in?</option><option>What is the name of your elementary school?</option></select>
            </div>
            <div class="mb-3"><label class="form-label">Answer</label><input type="text" id="s-answer" class="form-control" placeholder="Your answer"></div>
            <button class="btn btn-success" onclick="showToast('Security question saved!','success')"><i class="fas fa-save me-2"></i>Save</button>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card" style="border-color:var(--danger);">
          <div class="card-header" style="color:var(--danger);"><i class="fas fa-exclamation-triangle me-2"></i>Account Actions</div>
          <div class="card-body">
            <p style="font-size:.85rem;color:var(--gray-600);">Log out and return to login.</p>
            <button class="btn btn-danger" onclick="handleLogout(event)"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../data/mock-users.js"></script>
<script src="../../data/mock-students.js"></script>
<script src="../../assets/js/storage.js"></script>
<script src="../../assets/js/components.js"></script>
<script src="../../assets/js/auth.js"></script>
<script>
  const session = initTeacherPage('settings');
  loadComponent('#sidebar-placeholder', '/components/teacher-sidebar.html');
  if (session) {
    document.getElementById('avatar-display').textContent = session.name.charAt(0);
    document.getElementById('profile-name-display').textContent = session.name;
    document.getElementById('profile-role-display').textContent = session.position || 'Teacher';
    document.getElementById('s-name').value = session.name;
    const user = getUserById(session.id);
    if (user) document.getElementById('s-email').value = user.email || '';
  }
  function saveProfile() {
    const name = document.getElementById('s-name').value.trim();
    if (!name) { showToast('Name cannot be empty.', 'error'); return; }
    const s = getSession(); s.name = name;
    localStorage.setItem('spsmis_session', JSON.stringify(s));
    document.getElementById('profile-name-display').textContent = name;
    document.getElementById('avatar-display').textContent = name.charAt(0);
    document.getElementById('user-display-name').textContent = name;
    showToast('Profile updated!', 'success');
  }
  function changePassword() {
    const oldPw = document.getElementById('s-old-pw').value;
    const newPw = document.getElementById('s-new-pw').value;
    const confirmPw = document.getElementById('s-confirm-pw').value;
    const s = getSession();
    const user = MOCK_USERS.find(u => u.id === s.id);
    if (!user || oldPw !== user.password) { showToast('Current password is incorrect.', 'error'); return; }
    if (newPw.length < 6) { showToast('New password must be at least 6 characters.', 'error'); return; }
    if (newPw !== confirmPw) { showToast('Passwords do not match.', 'error'); return; }
    user.password = newPw;
    showToast('Password changed!', 'success');
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Teacher | SPSMIS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
  <style>.sidebar{background:#1e3a2f;}.sidebar-link.active{background:var(--secondary);}@media print{.no-print{display:none!important;}}</style>
</head>
<body>
<div id="desktop-only-overlay"><i class="fas fa-desktop"></i><h4>Desktop Required</h4><p>Please use a computer or laptop.</p></div>
<div id="sidebar-placeholder"></div>
<div class="app-wrapper">
  <div class="main-content page-content">
    <nav class="top-navbar no-print">
      <div><div class="page-title">Reports</div><nav aria-label="breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item text-muted">Teacher</li><li class="breadcrumb-item active">Reports</li></ol></nav></div>
      <div class="ms-auto"><div class="user-menu"><div class="user-avatar" id="user-avatar-text" style="background:var(--secondary);">T</div><div><div class="user-name" id="user-display-name">Teacher</div><div class="user-role" id="user-display-role">Teacher</div></div></div></div>
    </nav>
    <div class="page-header no-print"><h3>Grade Reports</h3><p>Generate class grade summaries</p></div>

    <div class="card mb-3 no-print">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-md-4"><label class="form-label mb-1">Grade Level</label><select id="r-grade" class="form-select" onchange="renderReport()"><option value="">All Grades</option></select></div>
          <div class="col-md-3"><label class="form-label mb-1">Search Student</label><input type="text" id="r-search" class="form-control" placeholder="Name or LRN..." oninput="renderReport()"></div>
          <div class="col-md-2"><button class="btn btn-outline-secondary" onclick="window.print()"><i class="fas fa-print me-2"></i>Print</button></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header d-flex align-items-center justify-content-between">
        <span><i class="fas fa-file-alt me-2" style="color:var(--secondary);"></i>Grade Summary Report</span>
        <span style="font-size:.78rem;color:var(--gray-600);">S.Y. 2025–2026</span>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-modern mb-0">
            <thead style="background:var(--secondary) !important;"><tr><th>#</th><th>LRN</th><th>Full Name</th><th>Grade</th><th>Section</th><th>Sex</th><th class="text-center">Graded</th><th class="text-center">General Avg.</th></tr></thead>
            <tbody id="report-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../data/mock-users.js"></script>
<script src="../../data/mock-students.js"></script>
<script src="../../data/mock-grades.js"></script>
<script src="../../assets/js/storage.js"></script>
<script src="../../assets/js/components.js"></script>
<script src="../../assets/js/auth.js"></script>
<script>
  initTeacherPage('reports');
  loadComponent('#sidebar-placeholder', '/components/teacher-sidebar.html');
  populateGradeDropdown(document.getElementById('r-grade'), true);

  function computeGeneralAvg(gradeData) {
    const subjects = Object.values(gradeData.subjects);
    if (!subjects.length) return 0;
    const total = subjects.reduce((sum, s) => sum + (parseInt(s.final) || 0), 0);
    return Math.round(total / subjects.length);
  }

  function renderReport() {
    const grade = document.getElementById('r-grade').value;
    const q = document.getElementById('r-search').value.toLowerCase();
    let list = getStudents().filter(s => {
      if (grade && s.gradeLevel !== grade) return false;
      const name = `${s.firstName} ${s.lastName}`.toLowerCase();
      if (q && !name.includes(q) && !s.lrn.includes(q)) return false;
      return true;
    });
    const grades = getGrades();
    const tbody = document.getElementById('report-tbody');
    if (!list.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center py-3 text-muted">No students found.</td></tr>'; return; }
    tbody.innerHTML = list.map((s,i) => {
      const gd = grades[s.id];
      const avg = gd ? computeGeneralAvg(gd) : null;
      return `<tr>
        <td>${i+1}</td>
        <td style="font-family:monospace;font-size:.82rem;">${s.lrn}</td>
        <td><strong>${s.lastName}</strong>, ${s.firstName}</td>
        <td>${s.gradeLevel}</td><td>${s.section}</td><td>${s.sex}</td>
        <td class="text-center">${gd ? '<span class="badge-passed">Yes</span>' : '<span class="badge" style="background:#fef7e0;color:#b06a00;border-radius:20px;padding:2px 8px;font-size:.75rem;">No</span>'}</td>
        <td class="text-center fw-bold ${avg !== null ? (avg >= 75 ? 'text-success' : 'text-danger') : ''}">${avg !== null ? avg : '—'}</td>
      </tr>`;
    }).join('');
  }
  renderReport();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profiles — Teacher | SPSMIS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
  <style>.sidebar{background:#1e3a2f;}.sidebar-link.active{background:var(--secondary);}</style>
</head>
<body>
<div id="desktop-only-overlay"><i class="fas fa-desktop"></i><h4>Desktop Required</h4><p>Please use a computer or laptop.</p></div>
<div id="sidebar-placeholder"></div>
<div class="app-wrapper">
  <div class="main-content page-content">
    <nav class="top-navbar">
      <div><div class="page-title">Student Profiles</div><nav aria-label="breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item text-muted">Teacher</li><li class="breadcrumb-item active">Student Profiles</li></ol></nav></div>
      <div class="ms-auto"><div class="user-menu"><div class="user-avatar" id="user-avatar-text" style="background:var(--secondary);">T</div><div><div class="user-name" id="user-display-name">Teacher</div><div class="user-role" id="user-display-role">Teacher</div></div></div></div>
    </nav>
    <div class="page-header"><h3>Student Profiles</h3><p>View student information (read-only)</p></div>

    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-2">
          <div class="col-md-5"><div class="search-bar"><i class="fas fa-search"></i><input type="text" id="search-input" class="form-control" placeholder="Search by name or LRN..." oninput="renderTable()"></div></div>
          <div class="col-md-3"><select id="filter-grade" class="form-select" onchange="renderTable()"><option value="">All Grade Levels</option></select></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><i class="fas fa-users me-2" style="color:var(--secondary);"></i>Students (<span id="count-display">0</span> records)</div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-modern mb-0">
            <thead style="background:var(--secondary) !important;"><tr><th>#</th><th>LRN</th><th>Full Name</th><th>Grade Level</th><th>Section</th><th>Sex</th><th>Age</th><th>Contact</th><th class="text-center">View</th></tr></thead>
            <tbody id="students-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="modal fade" id="viewModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--secondary);"><h5 class="modal-title">Student Profile</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body" id="view-modal-body"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../data/mock-users.js"></script>
<script src="../../data/mock-students.js"></script>
<script src="../../assets/js/storage.js"></script>
<script src="../../assets/js/components.js"></script>
<script src="../../assets/js/auth.js"></script>
<script>
  initTeacherPage('student-profiles');
  loadComponent('#sidebar-placeholder', '/components/teacher-sidebar.html');
  populateGradeDropdown(document.getElementById('filter-grade'), true);
  const viewModal = new bootstrap.Modal(document.getElementById('viewModal'));

  function renderTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const grade = document.getElementById('filter-grade').value;
    let list = getStudents().filter(s => {
      const name = `${s.firstName} ${s.lastName}`.toLowerCase();
      if (q && !name.includes(q) && !s.lrn.includes(q)) return false;
      if (grade && s.gradeLevel !== grade) return false;
      return true;
    });
    document.getElementById('count-display').textContent = list.length;
    const tbody = document.getElementById('students-tbody');
    if (!list.length) { tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><i class="fas fa-user-slash"></i><p>No students found.</p></div></td></tr>`; return; }
    tbody.innerHTML = list.map((s,i) => `<tr>
      <td>${i+1}</td><td style="font-family:monospace;font-size:.82rem;">${s.lrn}</td>
      <td><strong>${s.lastName}</strong>, ${s.firstName} ${s.middleName}</td>
      <td>${s.gradeLevel}</td><td>${s.section}</td><td>${s.sex}</td><td>${s.age}</td><td>${s.contact}</td>
      <td class="text-center"><button class="btn btn-sm btn-outline-success" onclick='viewStudent("${s.id}")'><i class="fas fa-eye"></i></button></td>
    </tr>`).join('');
  }

  function viewStudent(id) {
    const s = getStudentById(id);
    if (!s) return;
    document.getElementById('view-modal-body').innerHTML = `
      <div class="text-center mb-3"><div style="width:56px;height:56px;background:var(--secondary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:var(--secondary);margin:0 auto .6rem;">${s.firstName.charAt(0)}</div>
      <h6 class="fw-bold mb-0">${s.lastName}, ${s.firstName} ${s.middleName}</h6><span class="badge-active">Active</span></div>
      <div class="row g-2">
        <div class="col-md-4"><div style="background:var(--gray-100);border-radius:8px;padding:.6rem .8rem;"><div style="font-size:.7rem;color:var(--gray-600);">LRN</div><div class="fw-semibold" style="font-family:monospace;">${s.lrn}</div></div></div>
        <div class="col-md-4"><div style="background:var(--gray-100);border-radius:8px;padding:.6rem .8rem;"><div style="font-size:.7rem;color:var(--gray-600);">Grade Level</div><div class="fw-semibold">${s.gradeLevel}</div></div></div>
        <div class="col-md-4"><div style="background:var(--gray-100);border-radius:8px;padding:.6rem .8rem;"><div style="font-size:.7rem;color:var(--gray-600);">Section</div><div class="fw-semibold">${s.section}</div></div></div>
        <div class="col-md-4"><div style="background:var(--gray-100);border-radius:8px;padding:.6rem .8rem;"><div style="font-size:.7rem;color:var(--gray-600);">Sex</div><div class="fw-semibold">${s.sex}</div></div></div>
        <div class="col-md-4"><div style="background:var(--gray-100);border-radius:8px;padding:.6rem .8rem;"><div style="font-size:.7rem;color:var(--gray-600);">Age</div><div class="fw-semibold">${s.age}</div></div></div>
        <div class="col-md-4"><div style="background:var(--gray-100);border-radius:8px;padding:.6rem .8rem;"><div style="font-size:.7rem;color:var(--gray-600);">Contact</div><div class="fw-semibold">${s.contact}</div></div></div>
        <div class="col-12"><div style="background:var(--gray-100);border-radius:8px;padding:.6rem .8rem;"><div style="font-size:.7rem;color:var(--gray-600);">Address</div><div class="fw-semibold">${s.address}</div></div></div>
        <div class="col-md-6"><div style="background:var(--gray-100);border-radius:8px;padding:.6rem .8rem;"><div style="font-size:.7rem;color:var(--gray-600);">Guardian</div><div class="fw-semibold">${s.guardianName} (${s.guardianRelation})</div></div></div>
        <div class="col-md-6"><div style="background:var(--gray-100);border-radius:8px;padding:.6rem .8rem;"><div style="font-size:.7rem;color:var(--gray-600);">Religion / Mother Tongue</div><div class="fw-semibold">${s.religion} / ${s.motherTongue}</div></div></div>
      </div>`;
    viewModal.show();
  }
  renderTable();
</script>
</body>
</html>

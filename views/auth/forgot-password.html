<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — SPSMIS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <style>
    body { min-height: 100vh; background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .fp-card { background: #fff; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,.25); padding: 2.5rem 2rem; width: 100%; max-width: 400px; animation: fadeIn .35s ease; }
    .step { display: none; }
    .step.active { display: block; }
    .step-icon { width: 60px; height: 60px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 1rem; }
    .step-icon.success { background: var(--secondary-light); color: var(--secondary); }
    .progress-dots { display: flex; justify-content: center; gap: .5rem; margin-bottom: 1.5rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-200); transition: background .3s; }
    .dot.active { background: var(--primary); }
    .dot.done { background: var(--secondary); }
    .error-box { background: var(--danger-light); border-radius: 8px; padding: .6rem .9rem; font-size: .83rem; color: var(--danger); display: none; margin-bottom: 1rem; }
    .new-pw-display { background: var(--primary-light); border-radius: 8px; padding: 1rem; text-align: center; margin: 1rem 0; }
    .new-pw-display .pw-value { font-size: 1.3rem; font-weight: 700; color: var(--primary); letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="fp-card">
    <div class="progress-dots">
      <div class="dot active" id="dot-1"></div>
      <div class="dot" id="dot-2"></div>
      <div class="dot" id="dot-3"></div>
    </div>

    <!-- Step 1: Enter username -->
    <div class="step active" id="step-1">
      <div style="text-align:center;margin-bottom:1.5rem;">
        <div class="step-icon"><i class="fas fa-user-lock"></i></div>
        <h5 style="font-weight:700;">Forgot Password</h5>
        <p style="font-size:.83rem;color:var(--gray-600);">Enter your username to verify your identity</p>
      </div>
      <div class="error-box" id="err-1"><i class="fas fa-exclamation-circle me-1"></i><span id="err-1-msg"></span></div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="fp-username" class="form-control" placeholder="Enter your username">
      </div>
      <button class="btn btn-primary w-100" onclick="step1Next()">
        <i class="fas fa-arrow-right me-2"></i>Continue
      </button>
      <a href="login.html" class="back-link mt-3 d-block text-center" style="font-size:.82rem;color:var(--gray-600);text-decoration:none;">
        <i class="fas fa-arrow-left me-1"></i>Back to Login
      </a>
    </div>

    <!-- Step 2: Security Question -->
    <div class="step" id="step-2">
      <div style="text-align:center;margin-bottom:1.5rem;">
        <div class="step-icon"><i class="fas fa-shield-alt"></i></div>
        <h5 style="font-weight:700;">Security Question</h5>
        <p style="font-size:.83rem;color:var(--gray-600);">Answer your security question to reset your password</p>
      </div>
      <div class="error-box" id="err-2"><i class="fas fa-exclamation-circle me-1"></i><span id="err-2-msg"></span></div>
      <div class="mb-3">
        <label class="form-label">Security Question</label>
        <div id="security-question-display" style="background:var(--gray-100);border-radius:8px;padding:.65rem .9rem;font-size:.875rem;color:var(--gray-800);"></div>
      </div>
      <div class="mb-3">
        <label class="form-label">Your Answer</label>
        <input type="text" id="fp-answer" class="form-control" placeholder="Enter your answer">
      </div>
      <button class="btn btn-primary w-100" onclick="step2Next()">
        <i class="fas fa-check me-2"></i>Verify Answer
      </button>
      <button class="btn btn-light w-100 mt-2" onclick="goToStep(1)">
        <i class="fas fa-arrow-left me-2"></i>Back
      </button>
    </div>

    <!-- Step 3: Reset Success -->
    <div class="step" id="step-3">
      <div style="text-align:center;margin-bottom:1.5rem;">
        <div class="step-icon success"><i class="fas fa-check-circle"></i></div>
        <h5 style="font-weight:700;">Password Reset!</h5>
        <p style="font-size:.83rem;color:var(--gray-600);">Your temporary password is shown below. Please login and change it immediately.</p>
      </div>
      <div class="new-pw-display">
        <div style="font-size:.75rem;color:var(--gray-600);margin-bottom:.25rem;">Your new temporary password</div>
        <div class="pw-value" id="temp-password">—</div>
      </div>
      <button class="btn btn-primary w-100 mt-3" onclick="goToLogin()">
        <i class="fas fa-sign-in-alt me-2"></i>Go to Login
      </button>
    </div>
  </div>

  <script src="../../data/mock-users.js"></script>
  <script src="../../assets/js/storage.js"></script>
  <script>
    let foundUser = null;

    function goToStep(n) {
      document.querySelectorAll('.step').forEach((s, i) => {
        s.classList.toggle('active', i + 1 === n);
      });
      [1,2,3].forEach(i => {
        const dot = document.getElementById(`dot-${i}`);
        dot.className = 'dot' + (i < n ? ' done' : (i === n ? ' active' : ''));
      });
    }

    function step1Next() {
      const username = document.getElementById('fp-username').value.trim();
      const err = document.getElementById('err-1');
      const errMsg = document.getElementById('err-1-msg');
      err.style.display = 'none';

      if (!username) { err.style.display='block'; errMsg.textContent='Please enter your username.'; return; }

      const user = MOCK_USERS.find(u => u.username === username);
      if (!user) { err.style.display='block'; errMsg.textContent='Username not found. Please check and try again.'; return; }

      foundUser = user;
      document.getElementById('security-question-display').textContent = user.securityQuestion;
      goToStep(2);
    }

    function step2Next() {
      const answer = document.getElementById('fp-answer').value.trim();
      const err = document.getElementById('err-2');
      const errMsg = document.getElementById('err-2-msg');
      err.style.display = 'none';

      if (!answer) { err.style.display='block'; errMsg.textContent='Please enter your answer.'; return; }

      if (answer.toLowerCase() !== foundUser.securityAnswer.toLowerCase()) {
        err.style.display='block'; errMsg.textContent='Incorrect answer. Please try again.'; return;
      }

      const tempPw = 'Temp@' + Math.floor(1000 + Math.random() * 9000);
      document.getElementById('temp-password').textContent = tempPw;
      goToStep(3);
    }

    function goToLogin() {
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
